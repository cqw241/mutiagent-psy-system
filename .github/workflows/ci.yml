name: CI Smoke Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-smoke:
    name: Backend smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q --tb=short

      - name: Run risk eval mock baseline
        run: python scripts/run_risk_eval.py --mode mock --output-json /tmp/risk_eval_mock.json

  frontend-smoke:
    name: Frontend smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Run frontend node tests
        run: pnpm --dir frontend run test:node

      - name: Run frontend lint
        run: pnpm --dir frontend run lint

      - name: Build frontend
        run: pnpm --dir frontend run build
